version: '3.8'

services:
  aegis-node-1:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROFILE: release
    image: aegis-scheduler:latest
    container_name: aegis-node-1
    hostname: aegis-node-1
    ports:
      - "6000:6000"
      - "8000:8000"
    environment:
      RUST_LOG: info,aegis_scheduler=debug
      AEGIS_NODE_ID: "node-1"
      AEGIS_BIND_ADDR: "0.0.0.0:6000"
      AEGIS_METRICS_ADDR: "0.0.0.0:8000"
      AEGIS_PEERS: "aegis-node-1:6000,aegis-node-2:6000,aegis-node-3:6000"
    volumes:
      - aegis-wal-1:/var/lib/aegis/wal
      - aegis-snapshots-1:/var/lib/aegis/snapshots
    networks:
      - aegis-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    sysctls:
      - net.ipv4.tcp_tw_reuse=1
      - net.ipv4.tcp_nodelay=1

  aegis-node-2:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROFILE: release
    image: aegis-scheduler:latest
    container_name: aegis-node-2
    hostname: aegis-node-2
    ports:
      - "6001:6000"
      - "8001:8000"
    environment:
      RUST_LOG: info,aegis_scheduler=debug
      AEGIS_NODE_ID: "node-2"
      AEGIS_BIND_ADDR: "0.0.0.0:6000"
      AEGIS_METRICS_ADDR: "0.0.0.0:8000"
      AEGIS_PEERS: "aegis-node-1:6000,aegis-node-2:6000,aegis-node-3:6000"
    volumes:
      - aegis-wal-2:/var/lib/aegis/wal
      - aegis-snapshots-2:/var/lib/aegis/snapshots
    networks:
      - aegis-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    depends_on:
      - aegis-node-1
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    sysctls:
      - net.ipv4.tcp_tw_reuse=1
      - net.ipv4.tcp_nodelay=1

  aegis-node-3:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROFILE: release
    image: aegis-scheduler:latest
    container_name: aegis-node-3
    hostname: aegis-node-3
    ports:
      - "6002:6000"
      - "8002:8000"
    environment:
      RUST_LOG: info,aegis_scheduler=debug
      AEGIS_NODE_ID: "node-3"
      AEGIS_BIND_ADDR: "0.0.0.0:6000"
      AEGIS_METRICS_ADDR: "0.0.0.0:8000"
      AEGIS_PEERS: "aegis-node-1:6000,aegis-node-2:6000,aegis-node-3:6000"
    volumes:
      - aegis-wal-3:/var/lib/aegis/wal
      - aegis-snapshots-3:/var/lib/aegis/snapshots
    networks:
      - aegis-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    depends_on:
      - aegis-node-1
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    sysctls:
      - net.ipv4.tcp_tw_reuse=1
      - net.ipv4.tcp_nodelay=1

  prometheus:
    image: prom/prometheus:latest
    container_name: aegis-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - aegis-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  grafana:
    image: grafana/grafana:latest
    container_name: aegis-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
    networks:
      - aegis-network
    restart: unless-stopped
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  aegis-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  aegis-wal-1:
  aegis-wal-2:
  aegis-wal-3:
  aegis-snapshots-1:
  aegis-snapshots-2:
  aegis-snapshots-3:
  prometheus-data:
  grafana-data:
