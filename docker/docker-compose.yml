version: '3.8'

services:
  # AEGIS Node 1 (Leader)
  aegis-node-1:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      NODE_ID: "node-1"
      NODE_ADDR: "0.0.0.0:50051"
      PEERS: "aegis-node-2:50052,aegis-node-3:50053"
      INFERENCE_BACKEND: "mock"
      RUST_LOG: "info,aegis=debug"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
    ports:
      - "50051:50051"    # gRPC
      - "9001:9001"      # Prometheus metrics
    volumes:
      - ./models:/models:ro
      - node1-data:/var/lib/aegis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - aegis

  # AEGIS Node 2 (Follower)
  aegis-node-2:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      NODE_ID: "node-2"
      NODE_ADDR: "0.0.0.0:50052"
      PEERS: "aegis-node-1:50051,aegis-node-3:50053"
      INFERENCE_BACKEND: "mock"
      RUST_LOG: "info,aegis=debug"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
    ports:
      - "50052:50052"
      - "9002:9001"
    volumes:
      - ./models:/models:ro
      - node2-data:/var/lib/aegis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - aegis
    depends_on:
      aegis-node-1:
        condition: service_healthy

  # AEGIS Node 3 (Follower)
  aegis-node-3:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      NODE_ID: "node-3"
      NODE_ADDR: "0.0.0.0:50053"
      PEERS: "aegis-node-1:50051,aegis-node-2:50052"
      INFERENCE_BACKEND: "mock"
      RUST_LOG: "info,aegis=debug"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
    ports:
      - "50053:50053"
      - "9003:9001"
    volumes:
      - ./models:/models:ro
      - node3-data:/var/lib/aegis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - aegis
    depends_on:
      aegis-node-2:
        condition: service_healthy

  # Load Balancer (nginx) - Round-robin gRPC
  aegis-lb:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "50050:50050"  # Load-balanced gRPC endpoint
    networks:
      - aegis
    depends_on:
      - aegis-node-1
      - aegis-node-2
      - aegis-node-3

  # Prometheus - Metrics collection
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - aegis
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Jaeger - Distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP receiver
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - aegis

volumes:
  node1-data:
  node2-data:
  node3-data:
  prometheus-data:

networks:
  aegis:
    driver: bridge
